version: 2

builds:
  - binary: conoha
    ldflags:
      - -s -w -X github.com/crowdy/conoha-cli/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: crowdy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: conoha
    homepage: "https://crowdy.github.io/conoha-cli-pages/"
    description: "CLI tool for ConoHa VPS3 API"
    license: "Apache-2.0"

scoops:
  - repository:
      owner: crowdy
      name: crowdy-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    name: conoha
    homepage: "https://crowdy.github.io/conoha-cli-pages/"
    description: "CLI tool for ConoHa VPS3 API"
    license: "Apache-2.0"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
