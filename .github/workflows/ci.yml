name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      # skip-cache: the action's per-package analysis cache is keyed on
      # go.mod/go.sum/config, not source content, so a previous "0 issues"
      # result short-circuits re-analysis of files whose content would now
      # violate a rule. See #136 for the concrete false-pass we saw on
      # PR #134. ~20s extra per run is a fair trade for lint actually
      # being a reliable signal.
      - uses: golangci/golangci-lint-action@v7
        with:
          skip-cache: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go build -o /dev/null ./...

  # E2E DinD harness (spec 2026-04-23-e2e-tests-design.md §8).
  # Gating on this job: the 14 scenarios in tests/e2e/run.sh cover the
  # CLI ↔ conoha-proxy contract (boot, init, blue/green deploy + swap,
  # rollback in/out of drain window, list, env set/migrate legacy path,
  # destroy, proxy remove). Expected runtime is ~60-90s on ubuntu-latest.
  # TLS/ACME and real-VPS bugs are out of scope — see docs/release-checklist.md
  # for the manual smoke covering those.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: bash tests/e2e/run.sh
