name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}  # intentionally reuses HOMEBREW_TAP_TOKEN

  update-banner:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Update banner.svg version pill
        run: make banner-version V="${GITHUB_REF_NAME}"
      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          if git diff --quiet banner.svg; then
            echo "banner.svg already at ${VERSION}; nothing to do."
            exit 0
          fi
          BRANCH="chore/banner-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add banner.svg
          git commit -m "chore(banner): bump version pill to ${VERSION}"
          git push origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(banner): bump version pill to ${VERSION}" \
            --body "Auto-generated by the release workflow after publishing ${VERSION}. Updates the version pill rendered in \`banner.svg\` (shown in README headers)."
